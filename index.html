<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Tester | XRV LABS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.2.2/otpauth.umd.min.js"></script>

<style>
:root {
    --bg-color: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color));
    font-family: 'Segoe UI', sans-serif;
    color: var(--text-main);
}
.glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
}
h2 { margin-bottom: 5px; }
p { color: var(--text-muted); font-size: .9rem; }

#qrcode-container {
    display: none;
    justify-content: center;
    align-items: center;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    margin: 20px auto;
    width: 200px;
    height: 200px;
}

.secret-key {
    font-family: monospace;
    background: rgba(0,0,0,0.3);
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 10px;
    word-break: break-all;
    display: none;
    font-size: 0.8rem;
}

.timer {
    margin-bottom: 15px;
    font-size: 0.9rem;
    color: var(--text-muted);
}

.current-code {
    font-size: 1.4rem;
    letter-spacing: 3px;
    margin-bottom: 10px;
    display: none;
    color: #4ade80;
}

input {
    width: calc(100% - 30px);
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: white;
    font-size: 1.2rem;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 15px;
}
input:focus { border-color: var(--accent); outline: none; }

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 15px;
}
.btn-generate {
    background: var(--accent);
    color: white;
    border: none;
}
.btn-generate:hover { background: var(--accent-hover); }

.btn-test {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
}
.btn-test:hover { background: rgba(59,130,246,.1); }

.result {
    padding: 10px;
    border-radius: 8px;
    font-weight: 600;
    display: none;
}
.success {
    background: rgba(34,197,94,.2);
    color: #4ade80;
    border: 1px solid #22c55e;
    display: block;
}
.error {
    background: rgba(239,68,68,.2);
    color: #f87171;
    border: 1px solid #ef4444;
    display: block;
}
</style>
</head>

<body>

<div class="glass-panel">
    <h2>Auth Tester</h2>
    <p>Generate QR & Test 2FA Codes locally</p>

    <button class="btn-generate" onclick="generateAuth()">Generate Auth QR</button>

    <div id="qrcode-container"></div>
    <div id="secret-text" class="secret-key"></div>

    <div id="live-code" class="current-code"></div>
    <div id="timer" class="timer"></div>

    <input type="text" id="otp-input" placeholder="Enter 6-digit code" maxlength="6">

    <button class="btn-test" onclick="testCode()">Test Code</button>

    <div id="status-message" class="result"></div>
</div>

<script>
let currentTotp = null;
let interval = null;

function generateAuth() {
    let secret = new OTPAuth.Secret({ size: 20 });

    currentTotp = new OTPAuth.TOTP({
        issuer: 'XRV LABS',
        label: 'Test Project',
        algorithm: 'SHA1',
        digits: 6,
        period: 30,
        secret: secret
    });

    let uri = currentTotp.toString();
    document.getElementById('qrcode-container').innerHTML = '';

    new QRCode(document.getElementById("qrcode-container"), {
        text: uri,
        width: 170,
        height: 170
    });

    document.getElementById('qrcode-container').style.display = 'flex';

    let secretEl = document.getElementById('secret-text');
    secretEl.innerText = `Secret: ${secret.base32}`;
    secretEl.style.display = 'block';

    document.getElementById('live-code').style.display = 'block';

    startTimer();
    document.getElementById('status-message').style.display = 'none';
    document.getElementById('otp-input').value = '';
}

function startTimer() {
    clearInterval(interval);

    interval = setInterval(() => {
        if (!currentTotp) return;

        let now = Math.floor(Date.now() / 1000);
        let remaining = 30 - (now % 30);

        let token = currentTotp.generate();
        document.getElementById('live-code').innerText = `Current Code: ${token}`;
        document.getElementById('timer').innerText = `Expires in ${remaining}s`;
    }, 1000);
}

function testCode() {
    let statusEl = document.getElementById('status-message');
    let inputCode = document.getElementById('otp-input').value.trim();

    if (!currentTotp) {
        statusEl.innerText = 'Generate first!';
        statusEl.className = 'result error';
        return;
    }

    let delta = currentTotp.validate({ token: inputCode, window: 1 });

    if (delta !== null) {
        statusEl.innerText = '✅ Success! Code valid.';
        statusEl.className = 'result success';
    } else {
        statusEl.innerText = '❌ Invalid Code!';
        statusEl.className = 'result error';
    }
}

document.getElementById('otp-input').addEventListener("keypress", function(e) {
    if (e.key === "Enter") testCode();
});
</script>

</body>
</html>
